<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Scores — Dev Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
  #app { display: flex; height: 100vh; }
  #map { flex: 1; }
  #panel { width: 420px; overflow-y: auto; padding: 24px; border-left: 1px solid #1e293b; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
  .coord-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .coord-bar input { flex: 1; padding: 8px 12px; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: #e2e8f0; font-size: 14px; }
  .coord-bar button { padding: 8px 16px; border: none; border-radius: 6px; background: #3b82f6; color: #fff; cursor: pointer; font-size: 14px; white-space: nowrap; }
  .coord-bar button:hover { background: #2563eb; }
  .coord-bar button:disabled { background: #475569; cursor: not-allowed; }

  .score-card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .score-name { font-size: 16px; font-weight: 600; }
  .score-badge { font-size: 28px; font-weight: 700; }
  .score-label { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
  .score-bar { height: 6px; border-radius: 3px; background: #334155; margin-bottom: 12px; }
  .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .score-details { font-size: 13px; color: #94a3b8; }
  .score-details dt { float: left; width: 180px; color: #64748b; }
  .score-details dd { margin-left: 180px; margin-bottom: 4px; }

  .status { text-align: center; padding: 40px; color: #64748b; }
  .status.loading { color: #f59e0b; }
  .status.error { color: #ef4444; }

  .score-solar .score-bar-fill { background: linear-gradient(90deg, #f59e0b, #eab308); }
  .score-noise .score-bar-fill { background: linear-gradient(90deg, #ef4444, #22c55e); }
  .score-walk .score-bar-fill { background: linear-gradient(90deg, #ef4444, #3b82f6); }
  .score-flood .score-bar-fill { background: linear-gradient(90deg, #ef4444, #06b6d4); }
  .score-bushfire .score-bar-fill { background: linear-gradient(90deg, #ef4444, #f97316); }
  .score-heat .score-bar-fill { background: linear-gradient(90deg, #ef4444, #22c55e); }

  .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 12px; margin-top: 8px; }
  .cat-item { display: flex; justify-content: space-between; padding: 2px 0; }
  .cat-name { color: #94a3b8; }
  .cat-value { color: #e2e8f0; }
  .cat-missing { color: #475569; }
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <div id="panel">
    <h1>Property Scores</h1>
    <p class="subtitle">Click map or enter coordinates to compute scores</p>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <a href="/solar" style="padding:6px 12px;border-radius:6px;background:#1e293b;color:#eab308;font-size:13px;text-decoration:none;border:1px solid #334155;">Solar</a>
      <a href="/noise" style="padding:6px 12px;border-radius:6px;background:#1e293b;color:#8b5cf6;font-size:13px;text-decoration:none;border:1px solid #334155;">Noise</a>
      <a href="/walkability" style="padding:6px 12px;border-radius:6px;background:#1e293b;color:#3b82f6;font-size:13px;text-decoration:none;border:1px solid #334155;">Walkability</a>
      <a href="/flood" style="padding:6px 12px;border-radius:6px;background:#1e293b;color:#06b6d4;font-size:13px;text-decoration:none;border:1px solid #334155;">Flood</a>
      <a href="/bushfire" style="padding:6px 12px;border-radius:6px;background:#1e293b;color:#f97316;font-size:13px;text-decoration:none;border:1px solid #334155;">Bushfire</a>
      <a href="/heat-island" style="padding:6px 12px;border-radius:6px;background:#1e293b;color:#ef4444;font-size:13px;text-decoration:none;border:1px solid #334155;">Heat Island</a>
    </div>

    <div class="coord-bar">
      <input id="lat" type="number" step="any" placeholder="Latitude" value="-37.8136">
      <input id="lng" type="number" step="any" placeholder="Longitude" value="144.9631">
      <button id="btn-go" onclick="fetchScores()">Score</button>
    </div>

    <div id="results">
      <div class="status">Click anywhere on the map to begin</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([-37.8136, 144.9631], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom: 20,
  subdomains: 'abcd',
}).addTo(map);

let marker = null;

map.on('click', (e) => {
  document.getElementById('lat').value = e.latlng.lat.toFixed(6);
  document.getElementById('lng').value = e.latlng.lng.toFixed(6);
  fetchScores();
});

async function fetchScores() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lng = parseFloat(document.getElementById('lng').value);
  if (isNaN(lat) || isNaN(lng)) return;

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lng]).addTo(map);
  map.setView([lat, lng], Math.max(map.getZoom(), 13));

  const btn = document.getElementById('btn-go');
  btn.disabled = true;
  btn.textContent = '...';

  const results = document.getElementById('results');
  results.innerHTML = '<div class="status loading">Computing scores...</div>';

  const scores = {};

  // Fetch each score independently so partial results show even if one fails
  const endpoints = [
    { key: 'solar', url: `/scores/solar?lat=${lat}&lng=${lng}` },
    { key: 'noise', url: `/scores/noise?lat=${lat}&lng=${lng}` },
    { key: 'walkability', url: `/scores/walkability?lat=${lat}&lng=${lng}` },
    { key: 'flood', url: `/scores/flood?lat=${lat}&lng=${lng}` },
    { key: 'bushfire', url: `/scores/bushfire?lat=${lat}&lng=${lng}` },
    { key: 'heat_island', url: `/scores/heat-island?lat=${lat}&lng=${lng}` },
  ];

  const promises = endpoints.map(async (ep) => {
    try {
      const resp = await fetch(ep.url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      scores[ep.key] = await resp.json();
    } catch (err) {
      scores[ep.key] = { error: err.message };
    }
  });

  await Promise.all(promises);
  btn.disabled = false;
  btn.textContent = 'Score';
  renderResults(lat, lng, scores);
}

function scoreColor(score) {
  if (score >= 70) return '#22c55e';
  if (score >= 40) return '#f59e0b';
  return '#ef4444';
}

function renderResults(lat, lng, scores) {
  const el = document.getElementById('results');
  let html = '';

  // Solar
  if (scores.solar && !scores.solar.error && scores.solar.score != null) {
    const s = scores.solar;
    html += `
      <div class="score-card score-solar">
        <div class="score-header">
          <span class="score-name">Solar Potential</span>
          <span class="score-badge" style="color:${scoreColor(s.score)}">${s.score}</span>
        </div>
        <div class="score-label">${s.label}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${s.score}%;background:${scoreColor(s.score)}"></div></div>
        <dl class="score-details">
          <dt>GHI</dt><dd>${s.ghi_kwh_m2_year ?? 'N/A'} kWh/m&sup2;/year</dd>
          <dt>DNI</dt><dd>${s.dni_kwh_m2_year ?? 'N/A'} kWh/m&sup2;/year</dd>
          <dt>PV Output</dt><dd>${s.pvout_kwh_kwp_year} kWh/kWp/year</dd>
          <dt>Optimal Tilt</dt><dd>${s.optimal_tilt_deg}&deg;</dd>
          <dt>Avg Temperature</dt><dd>${s.temp_avg_c}&deg;C</dd>
          <dt>Elevation</dt><dd>${s.elevation_m}m</dd>
          ${s.estimated_annual_kwh ? `<dt>Est. Annual (50m&sup2; roof)</dt><dd>${s.estimated_annual_kwh.toLocaleString()} kWh</dd>` : ''}
        </dl>
      </div>`;
  } else {
    html += renderError('Solar Potential', scores.solar);
  }

  // Noise
  if (scores.noise && !scores.noise.error && scores.noise.score != null) {
    const s = scores.noise;
    html += `
      <div class="score-card score-noise">
        <div class="score-header">
          <span class="score-name">Noise Level</span>
          <span class="score-badge" style="color:${scoreColor(s.score)}">${s.score}</span>
        </div>
        <div class="score-label">${s.label} &mdash; ~${s.estimated_db} dB</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        <dl class="score-details">
          <dt>Estimated Level</dt><dd>${s.estimated_db} dB</dd>
          <dt>Roads in Range</dt><dd>${s.road_count}</dd>
        </dl>
      </div>`;
  } else {
    html += renderError('Noise Level', scores.noise);
  }

  // Walkability
  if (scores.walkability && !scores.walkability.error && scores.walkability.score != null) {
    const s = scores.walkability;
    html += `
      <div class="score-card score-walk">
        <div class="score-header">
          <span class="score-name">Walkability</span>
          <span class="score-badge" style="color:${scoreColor(s.score)}">${s.score}</span>
        </div>
        <div class="score-label">${s.label}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        <dl class="score-details">
          <dt>POIs Found</dt><dd>${s.poi_count}</dd>
        </dl>
        <div class="category-grid">
          ${Object.entries(s.category_scores || {}).map(([cat, info]) => `
            <div class="cat-item">
              <span class="cat-name">${cat}</span>
              <span class="${info.distance_m ? 'cat-value' : 'cat-missing'}">${info.distance_m ? info.distance_m + 'm' : 'none'}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  } else {
    html += renderError('Walkability', scores.walkability);
  }

  // Flood
  if (scores.flood && !scores.flood.error && scores.flood.score != null) {
    const s = scores.flood;
    const zones = s.flood_zones?.length ? s.flood_zones.join(', ') : 'None';
    html += `
      <div class="score-card score-flood">
        <div class="score-header">
          <span class="score-name">Flood Risk</span>
          <span class="score-badge" style="color:${scoreColor(s.score)}">${s.score}</span>
        </div>
        <div class="score-label">${s.label} (${s.state || 'N/A'})</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        <dl class="score-details">
          <dt>Flood Zones</dt><dd>${zones}</dd>
          <dt>Zone Count</dt><dd>${s.zone_count}</dd>
        </dl>
      </div>`;
  } else {
    html += renderError('Flood Risk', scores.flood);
  }

  // Bushfire
  if (scores.bushfire && !scores.bushfire.error && scores.bushfire.score != null) {
    const s = scores.bushfire;
    const zones = s.bushfire_zones?.length ? s.bushfire_zones.join(', ') : 'None';
    html += `
      <div class="score-card score-bushfire">
        <div class="score-header">
          <span class="score-name">Bushfire Risk</span>
          <span class="score-badge" style="color:${scoreColor(s.score)}">${s.score}</span>
        </div>
        <div class="score-label">${s.label}${s.category ? ' — ' + s.category : ''}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        <dl class="score-details">
          <dt>Overlay</dt><dd>${zones}</dd>
        </dl>
      </div>`;
  } else {
    html += renderError('Bushfire Risk', scores.bushfire);
  }

  // Heat Island
  if (scores.heat_island && !scores.heat_island.error && scores.heat_island.score != null) {
    const s = scores.heat_island;
    html += `
      <div class="score-card score-heat">
        <div class="score-header">
          <span class="score-name">Heat Island</span>
          <span class="score-badge" style="color:${scoreColor(s.score)}">${s.score}</span>
        </div>
        <div class="score-label">${s.label}</div>
        <div class="score-bar"><div class="score-bar-fill" style="width:${s.score}%"></div></div>
        <dl class="score-details">
          <dt>Summer Mean Max</dt><dd>${s.summer_mean_c}°C</dd>
          <dt>Summer P90 Max</dt><dd>${s.summer_p90_c}°C</dd>
          ${s.building_density != null ? `<dt>Building Density</dt><dd>${s.building_density}</dd>` : ''}
          ${s.greenspace_factor != null ? `<dt>Green Space</dt><dd>${s.greenspace_factor}</dd>` : ''}
        </dl>
      </div>`;
  } else {
    html += renderError('Heat Island', scores.heat_island);
  }

  el.innerHTML = html;
}

function renderError(name, data) {
  const msg = data?.error || 'Not available';
  return `
    <div class="score-card">
      <div class="score-header">
        <span class="score-name">${name}</span>
        <span class="score-badge" style="color:#475569">—</span>
      </div>
      <div class="score-label status error" style="text-align:left">${msg}</div>
    </div>`;
}
</script>
</body>
</html>
