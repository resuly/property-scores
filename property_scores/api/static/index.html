<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Scores — Dev Test</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
  #map { position: absolute; inset: 0; }
  .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none; }
</style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

<div class="flex h-screen">
  <!-- Map -->
  <div class="flex-1 relative">
    <div id="map"></div>
  </div>

  <!-- Panel -->
  <div class="w-[420px] border-l border-slate-200 bg-white overflow-y-auto">
    <div class="p-6">
      <!-- Header -->
      <div class="mb-5">
        <h1 class="text-xl font-bold text-slate-900">Property Scores</h1>
        <p class="text-xs text-slate-400 mt-1">Click map or enter coordinates to compute scores</p>
      </div>

      <!-- Navigation pills -->
      <div class="flex flex-wrap gap-1.5 mb-5">
        <a href="/solar" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-amber-600 hover:bg-amber-50 transition-colors">Solar</a>
        <a href="/noise" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-violet-600 hover:bg-violet-50 transition-colors">Noise</a>
        <a href="/walkability" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-blue-600 hover:bg-blue-50 transition-colors">Walkability</a>
        <a href="/flood" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-cyan-600 hover:bg-cyan-50 transition-colors">Flood</a>
        <a href="/bushfire" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-orange-600 hover:bg-orange-50 transition-colors">Bushfire</a>
        <a href="/heat-island" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-red-600 hover:bg-red-50 transition-colors">Heat Island</a>
        <a href="/view-quality" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-violet-600 hover:bg-violet-50 transition-colors">View Quality</a>
        <a href="/contamination" class="px-2.5 py-1 rounded-md text-xs font-medium border border-slate-200 bg-white text-emerald-600 hover:bg-emerald-50 transition-colors">Contamination</a>
      </div>

      <!-- Coordinate input -->
      <div class="flex gap-2 mb-5">
        <input id="lat" type="number" step="any" placeholder="Latitude" value="-37.8136"
               class="input-field flex-1 min-w-0">
        <input id="lng" type="number" step="any" placeholder="Longitude" value="144.9631"
               class="input-field flex-1 min-w-0">
        <button id="btn-go" onclick="fetchScores()" class="btn-primary whitespace-nowrap">Score</button>
      </div>

      <!-- Results -->
      <div id="results">
        <div class="text-center py-10 text-sm text-slate-400">Click anywhere on the map to begin</div>
      </div>
    </div>
  </div>
</div>

<script>
let map, marker;

async function initMap() {
  const cfg = await fetch('/api/config').then(r => r.json());
  mapboxgl.accessToken = cfg.mapbox_token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [144.9631, -37.8136],
    zoom: 12,
  });
  map.addControl(new mapboxgl.NavigationControl(), 'top-right');
  map.on('click', (e) => {
    document.getElementById('lat').value = e.lngLat.lat.toFixed(6);
    document.getElementById('lng').value = e.lngLat.lng.toFixed(6);
    fetchScores();
  });
}
initMap();

async function fetchScores() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lng = parseFloat(document.getElementById('lng').value);
  if (isNaN(lat) || isNaN(lng)) return;

  if (marker) marker.remove();
  marker = new mapboxgl.Marker({ color: '#2563eb' })
    .setLngLat([lng, lat])
    .addTo(map);
  map.flyTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 13) });

  const btn = document.getElementById('btn-go');
  btn.disabled = true;
  btn.textContent = '...';

  const results = document.getElementById('results');
  results.innerHTML = '';

  const endpoints = [
    { key: 'solar', url: `/scores/solar?lat=${lat}&lng=${lng}` },
    { key: 'noise', url: `/scores/noise?lat=${lat}&lng=${lng}` },
    { key: 'walkability', url: `/scores/walkability?lat=${lat}&lng=${lng}` },
    { key: 'contamination', url: `/scores/contamination?lat=${lat}&lng=${lng}` },
    { key: 'flood', url: `/scores/flood?lat=${lat}&lng=${lng}` },
    { key: 'bushfire', url: `/scores/bushfire?lat=${lat}&lng=${lng}` },
    { key: 'heat_island', url: `/scores/heat-island?lat=${lat}&lng=${lng}` },
    { key: 'view_quality', url: `/scores/view-quality?lat=${lat}&lng=${lng}` },
  ];

  const scores = {};
  let arrived = 0;

  for (const ep of endpoints) {
    const div = document.createElement('div');
    div.id = `score-${ep.key}`;
    div.className = 'card p-4 mb-3';
    div.innerHTML = `<div class="flex justify-between items-center"><span class="text-sm font-semibold text-slate-700">${ep.key.replace('_',' ')}</span><span class="text-2xl font-bold text-slate-300">...</span></div>`;
    results.appendChild(div);
  }

  const promises = endpoints.map(async (ep) => {
    try {
      const resp = await fetch(ep.url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      scores[ep.key] = await resp.json();
    } catch (err) {
      scores[ep.key] = { error: err.message };
    }
    arrived++;
    renderResults(lat, lng, scores);
    if (arrived === endpoints.length) {
      btn.disabled = false;
      btn.textContent = 'Score';
    }
  });

  await Promise.all(promises);
}

function scoreColor(score) {
  if (score >= 70) return '#16a34a';
  if (score >= 40) return '#d97706';
  return '#dc2626';
}

function renderResults(lat, lng, scores) {
  const el = document.getElementById('results');
  let html = '';

  // Solar
  if (scores.solar && !scores.solar.error && scores.solar.score != null) {
    const s = scores.solar;
    html += scoreCard('Solar Potential', s.score, s.label, 'bar-solar', 'badge-solar', `
      <dt>GHI</dt><dd>${s.ghi_kwh_m2_year ?? 'N/A'} kWh/m&sup2;/year</dd>
      <dt>DNI</dt><dd>${s.dni_kwh_m2_year ?? 'N/A'} kWh/m&sup2;/year</dd>
      <dt>PV Output</dt><dd>${s.pvout_kwh_kwp_year} kWh/kWp/year</dd>
      <dt>Optimal Tilt</dt><dd>${s.optimal_tilt_deg}&deg;</dd>
      <dt>Avg Temperature</dt><dd>${s.temp_avg_c}&deg;C</dd>
      <dt>Elevation</dt><dd>${s.elevation_m}m</dd>
      ${s.estimated_annual_kwh ? `<dt>Est. Annual (50m&sup2;)</dt><dd>${s.estimated_annual_kwh.toLocaleString()} kWh</dd>` : ''}`);
  } else { html += errorCard('Solar Potential', scores.solar); }

  // Noise
  if (scores.noise && !scores.noise.error && scores.noise.score != null) {
    const s = scores.noise;
    let d = `<dt>Total Noise</dt><dd>${s.estimated_db} dB</dd><dt>Road Noise</dt><dd>${s.road_db} dB</dd>`;
    if (s.rail_db) d += `<dt>Rail Noise</dt><dd>${s.rail_db} dB</dd>`;
    if (s.aircraft_db) d += `<dt>Aircraft</dt><dd>${s.aircraft_db} dB</dd>`;
    if (s.dominant_source) d += `<dt>Dominant</dt><dd>${s.dominant_source}</dd>`;
    if (s.nearest_tram_m != null) d += `<dt>Nearest Tram</dt><dd>${s.nearest_tram_m}m</dd>`;
    if (s.nearest_train_m != null) d += `<dt>Nearest Train</dt><dd>${s.nearest_train_m}m</dd>`;
    if (s.max_building_screening_db) d += `<dt>Building Screen</dt><dd>-${s.max_building_screening_db} dB</dd>`;
    if (s.aircraft) d += `<dt>Aircraft Zone</dt><dd>${s.aircraft.zone_code}</dd>`;
    d += `<dt>AADT Segments</dt><dd>${s.aadt_segments}</dd>`;
    html += scoreCard('Noise Level', s.score, `${s.label} — ~${s.estimated_db} dB`, 'bar-noise', 'badge-noise', d);
  } else { html += errorCard('Noise Level', scores.noise); }

  // Walkability
  if (scores.walkability && !scores.walkability.error && scores.walkability.score != null) {
    const s = scores.walkability;
    let d = `<dt>POIs Found</dt><dd>${s.poi_count}</dd>`;
    const cats = Object.entries(s.category_scores || {}).map(([cat, info]) =>
      `<div class="flex justify-between py-0.5 text-xs"><span class="text-slate-400">${cat}</span><span class="${info.distance_m ? 'text-slate-700' : 'text-slate-300'}">${info.distance_m ? info.distance_m + 'm' : 'none'}</span></div>`
    ).join('');
    html += scoreCard('Walkability', s.score, s.label, 'bar-walk', 'badge-walk', d, cats ? `<div class="grid grid-cols-2 gap-x-3 mt-2 pt-2 border-t border-slate-100">${cats}</div>` : '');
  } else { html += errorCard('Walkability', scores.walkability); }

  // Flood
  if (scores.flood && !scores.flood.error && scores.flood.score != null) {
    const s = scores.flood;
    const zones = s.flood_zones?.length ? s.flood_zones.join(', ') : 'None';
    let d = `<dt>Overlay Zones</dt><dd>${zones}</dd>`;
    if (s.jrc) {
      d += `<dt>JRC Flood Cells</dt><dd>${s.jrc.flood_cells}/${s.jrc.total_cells}</dd>`;
      d += `<dt>Max Occurrence</dt><dd>${s.jrc.max_occurrence_pct}%</dd>`;
      if (s.jrc.nearest_water_m != null) d += `<dt>Nearest Water</dt><dd>${s.jrc.nearest_water_m}m</dd>`;
    }
    if (s.hand) d += `<dt>HAND</dt><dd>${s.hand.hand_m}m above drainage</dd>`;
    if (s.p95) d += `<dt>P95 Rainfall</dt><dd>${s.p95.p95_mm}mm/day</dd>`;
    html += scoreCard('Flood Risk', s.score, `${s.label} (${s.state || 'N/A'})`, 'bar-flood', 'badge-flood', d);
  } else { html += errorCard('Flood Risk', scores.flood); }

  // Bushfire
  if (scores.bushfire && !scores.bushfire.error && scores.bushfire.score != null) {
    const s = scores.bushfire;
    const zones = s.bushfire_zones?.length ? s.bushfire_zones.join(', ') : 'None';
    let d = `<dt>Overlay</dt><dd>${zones}</dd>`;
    if (s.vegetation) d += `<dt>Vegetation</dt><dd>${s.vegetation.land_cover_label} (fuel ${s.vegetation.fuel_risk})</dd>`;
    if (s.slope) {
      d += `<dt>Slope</dt><dd>${s.slope.mean_slope_deg}&deg; avg, ${s.slope.max_slope_deg}&deg; max</dd>`;
      d += `<dt>Elevation</dt><dd>${s.slope.elevation_m}m</dd>`;
    }
    if (s.fire_history) d += `<dt>Fire History</dt><dd>${s.fire_history.seasons_with_fire}/${s.fire_history.total_seasons_checked} seasons</dd>`;
    html += scoreCard('Bushfire Risk', s.score, `${s.label}${s.category ? ' — ' + s.category : ''}`, 'bar-bushfire', 'badge-fire', d);
  } else { html += errorCard('Bushfire Risk', scores.bushfire); }

  // Heat Island
  if (scores.heat_island && !scores.heat_island.error && scores.heat_island.score != null) {
    const s = scores.heat_island;
    let d = '';
    if (s.modis_lst_c) d += `<dt>Surface Temp</dt><dd>${s.modis_lst_c}°C</dd>`;
    if (s.uhi_delta_c != null) d += `<dt>UHI Delta</dt><dd>${s.uhi_delta_c > 0 ? '+' : ''}${s.uhi_delta_c}°C</dd>`;
    if (s.summer_mean_c) d += `<dt>ERA5 Summer Mean</dt><dd>${s.summer_mean_c}°C</dd>`;
    if (s.summer_p90_c) d += `<dt>ERA5 P90</dt><dd>${s.summer_p90_c}°C</dd>`;
    if (s.building_density != null) d += `<dt>Building Density</dt><dd>${s.building_density}</dd>`;
    if (s.greenspace_factor != null) d += `<dt>Green Space</dt><dd>${s.greenspace_factor}</dd>`;
    html += scoreCard('Heat Island', s.score, s.label, 'bar-heat', 'badge-heat', d);
  } else { html += errorCard('Heat Island', scores.heat_island); }

  // View Quality
  if (scores.view_quality && !scores.view_quality.error && scores.view_quality.score != null) {
    const s = scores.view_quality;
    let d = `<dt>Active Factors</dt><dd>${s.active_factors}/5</dd>`;
    const f = s.factors || {};
    if (f.ocean_proximity) d += `<dt>Ocean</dt><dd>${f.ocean_proximity.distance_m}m (${(f.ocean_proximity.value*100).toFixed(0)}%)</dd>`;
    if (f.inland_water) d += `<dt>Inland Water</dt><dd>${f.inland_water.distance_m}m (${(f.inland_water.value*100).toFixed(0)}%)</dd>`;
    if (f.elevation_advantage) d += `<dt>Elevation</dt><dd>${f.elevation_advantage.elevation_m}m (+${f.elevation_advantage.advantage_m}m)</dd>`;
    if (f.green_space) d += `<dt>Green Space</dt><dd>${f.green_space.count} POIs, nearest ${f.green_space.nearest_m}m</dd>`;
    if (f.building_openness) d += `<dt>Buildings 300m</dt><dd>${f.building_openness.buildings_300m} (${f.building_openness.tall_buildings} tall)</dd>`;
    html += scoreCard('View Quality', s.score, s.label, 'bar-view', 'badge-view', d);
  } else { html += errorCard('View Quality', scores.view_quality); }

  // Contamination
  if (scores.contamination && !scores.contamination.error && scores.contamination.score != null) {
    const s = scores.contamination;
    const ind = s.industrial || {};
    let d = `<dt>EPA Sites (2km)</dt><dd>${s.epa_sites_count}</dd>`;
    if (s.nearest_epa_site) d += `<dt>Nearest EPA</dt><dd>${s.nearest_epa_site.distance_m}m</dd>`;
    d += `<dt>Industrial POIs (500m)</dt><dd>${ind.count_500m || 0}</dd>`;
    if (ind.nearest_m) d += `<dt>Nearest Industrial</dt><dd>${ind.nearest_type} (${ind.nearest_m}m)</dd>`;
    html += scoreCard('Contamination', s.score, `${s.label} (${s.state})`, 'bar-contam', 'badge-contam', d);
  } else { html += errorCard('Contamination', scores.contamination); }

  html += `<div class="mt-4 px-3 py-2 border-l-2 border-slate-200 text-[11px] text-slate-400 leading-relaxed">Scores are estimates based on open data and satellite imagery. They are not professional assessments and should not be used for insurance, legal, or financial decisions. View Quality is based on proximity, not actual line-of-sight.</div>`;

  el.innerHTML = html;
}

function scoreCard(name, score, label, barClass, badgeClass, detailsHtml, extraHtml) {
  const color = scoreColor(score);
  return `
    <div class="card p-4 mb-3">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm font-semibold text-slate-700">${name}</span>
        <span class="text-2xl font-bold" style="color:${color}">${score}</span>
      </div>
      <div class="text-xs text-slate-400 mb-3">${label}</div>
      <div class="h-1.5 rounded-full bg-slate-100 mb-3">
        <div class="${barClass} h-full rounded-full transition-all duration-500" style="width:${score}%"></div>
      </div>
      <dl class="text-xs [&>dt]:float-left [&>dt]:w-[160px] [&>dt]:text-slate-400 [&>dd]:ml-[160px] [&>dd]:text-slate-600 [&>dd]:mb-1">${detailsHtml}</dl>
      ${extraHtml || ''}
    </div>`;
}

function errorCard(name, data) {
  const msg = data?.error || 'Not available';
  return `
    <div class="card p-4 mb-3">
      <div class="flex justify-between items-center">
        <span class="text-sm font-semibold text-slate-700">${name}</span>
        <span class="text-2xl font-bold text-slate-300">&mdash;</span>
      </div>
      <div class="text-xs text-red-500 mt-2">${msg}</div>
    </div>`;
}
</script>
</body>
</html>
