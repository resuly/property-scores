<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Debug Map - Property Scores</title>
<link rel="stylesheet" href="/css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
  #map { position: absolute; top: 0; left: 0; right: 380px; bottom: 0; }
  .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none; }
  .toggle-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; cursor: pointer; user-select: none; }
  .toggle-row input { cursor: pointer; }
  .toggle-row span { font-size: 12px; color: #475569; }
</style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

<div id="map"></div>

<div class="absolute top-0 right-0 w-[380px] bottom-0 bg-white border-l border-slate-200 overflow-y-auto">
  <div class="p-5">
    <div class="flex items-center gap-2 mb-1">
      <a href="/" class="text-slate-400 hover:text-brand-600 text-sm">&larr;</a>
      <h1 class="text-lg font-bold">Noise Source Debug</h1>
    </div>
    <p class="text-xs text-slate-400 mb-4">Click the map or enter coordinates.</p>
    <div class="flex gap-2 mb-2">
      <input id="lat" type="number" step="any" placeholder="Lat" value="-37.8136" class="input-field flex-1 min-w-0">
      <input id="lng" type="number" step="any" placeholder="Lng" value="144.9631" class="input-field flex-1 min-w-0">
      <button onclick="query()" class="btn-primary">Go</button>
    </div>
    <div class="flex flex-wrap gap-1 mb-4 text-[11px]">
      <button onclick="setPoint(-37.8136,144.9631,'CBD')" class="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">CBD</button>
      <button onclick="setPoint(-37.7950,144.9500,'Royal Park')" class="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">Royal Park</button>
      <button onclick="setPoint(-37.7125,144.8443,'Tullamarine Fwy')" class="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">Tullamarine Fwy</button>
      <button onclick="setPoint(-37.8670,144.9760,'St Kilda')" class="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">St Kilda</button>
      <button onclick="setPoint(-37.7650,145.3367,'Olinda Hills')" class="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">Olinda Hills</button>
      <button onclick="setPoint(-37.6675,144.7860,'Tullamarine Apt')" class="px-2 py-0.5 bg-slate-100 hover:bg-slate-200 rounded text-slate-600">Airport</button>
    </div>

    <!-- Layer toggles -->
    <div class="card p-3 mb-4">
      <div class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wide">Layers</div>
      <label class="toggle-row"><input type="checkbox" id="t-screening" checked> <span>Building screening (color sources by attenuation)</span></label>
      <label class="toggle-row"><input type="checkbox" id="t-ripple" checked> <span>Sound wave ripple animation</span></label>
      <label class="toggle-row"><input type="checkbox" id="t-terrain" checked> <span>Terrain profile to dominant source</span></label>
      <label class="toggle-row"><input type="checkbox" id="t-facade" checked> <span>Facade direction pie</span></label>
    </div>

    <div id="loading" class="hidden text-brand-500 text-sm py-5 text-center">Querying noise sources...</div>
    <div id="score-box" class="hidden card p-4 mb-4"></div>
    <div id="terrain-chart" class="hidden card p-3 mb-4"></div>
    <div id="sources"></div>
  </div>
</div>

<!-- Legend -->
<div class="absolute bottom-5 left-3 bg-white/95 backdrop-blur rounded-lg shadow-sm border border-slate-200 px-3 py-2 text-xs text-slate-600 z-10">
  <div class="flex items-center gap-2 mb-1"><span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span> VicRoads AADT</div>
  <div class="flex items-center gap-2 mb-1"><span class="w-2.5 h-2.5 rounded-full bg-amber-500 inline-block"></span> NFDH Station</div>
  <div class="flex items-center gap-2 mb-1"><span class="w-5 h-0.5 bg-blue-500 inline-block rounded"></span> Train</div>
  <div class="flex items-center gap-2 mb-1"><span class="w-5 h-0.5 bg-green-500 inline-block rounded"></span> Tram</div>
  <div class="flex items-center gap-2 mb-1"><span class="w-3.5 h-3.5 rounded-full bg-violet-500 inline-block"></span> Query Point</div>
  <div class="flex items-center gap-2 pt-1 mt-1 border-t border-slate-200"><span class="w-5 h-0.5 inline-block rounded" style="background:linear-gradient(to right,#ef4444,#22c55e)"></span> Direct → Screened</div>
</div>

<script>
let map, popup;
const sourceIds = [];
let lastData = null;        // cache of last debug response
let rippleRAF = null;       // animation frame id
let rippleStart = 0;        // animation start time
const TOGGLE_IDS = ['t-screening', 't-ripple', 't-terrain', 't-facade'];

function getToggles() {
  return Object.fromEntries(TOGGLE_IDS.map(id => [id.slice(2), document.getElementById(id).checked]));
}

function setPoint(lat, lng, label) {
  document.getElementById('lat').value = lat.toFixed(4);
  document.getElementById('lng').value = lng.toFixed(4);
  query();
}

async function initMap() {
  const cfg = await fetch('/api/config').then(r => r.json());
  mapboxgl.accessToken = cfg.mapbox_token;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [144.9631, -37.8136],
    zoom: 16,
  });
  map.addControl(new mapboxgl.NavigationControl(), 'top-right');
  popup = new mapboxgl.Popup({ closeButton: false, closeOnClick: false });
  map.on('click', (e) => {
    document.getElementById('lat').value = e.lngLat.lat.toFixed(6);
    document.getElementById('lng').value = e.lngLat.lng.toFixed(6);
    query();
  });

  // Wire toggle change handlers — re-render existing data without re-fetching
  for (const id of TOGGLE_IDS) {
    document.getElementById(id).addEventListener('change', () => {
      if (lastData) renderResult(lastData, lastData.query.lat, lastData.query.lng);
    });
  }
}
initMap();

function clearLayers() {
  if (rippleRAF) { cancelAnimationFrame(rippleRAF); rippleRAF = null; }
  for (const id of sourceIds) {
    if (map.getLayer(id)) map.removeLayer(id);
    if (map.getSource(id)) map.removeSource(id);
  }
  sourceIds.length = 0;
}

function addGeoJSON(id, geojson, layerDef) {
  map.addSource(id, { type: 'geojson', data: geojson });
  map.addLayer({ id, source: id, ...layerDef });
  sourceIds.push(id);
}

function scoreColor(score) {
  return score >= 60 ? '#16a34a' : score >= 40 ? '#d97706' : '#dc2626';
}

// Color a source line by screening dB:
//   0 dB screening = direct line of sight = red
//   25 dB screening = fully blocked = green
function screeningColor(screeningDb) {
  const t = Math.min(Math.max(screeningDb / 25, 0), 1);
  const r = Math.round(239 + (34 - 239) * t);   // 239→34
  const g = Math.round(68 + (197 - 68) * t);    // 68→197
  const b = Math.round(68 + (94 - 68) * t);     // 68→94
  return `rgb(${r},${g},${b})`;
}

async function query() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lng = parseFloat(document.getElementById('lng').value);
  if (isNaN(lat) || isNaN(lng)) return;

  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('score-box').classList.add('hidden');
  document.getElementById('terrain-chart').classList.add('hidden');
  document.getElementById('sources').innerHTML = '';
  clearLayers();

  map.flyTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 16) });

  try {
    const resp = await fetch(`/scores/noise/debug?lat=${lat}&lng=${lng}&radius=500`);
    const data = await resp.json();
    document.getElementById('loading').classList.add('hidden');
    if (data.error) { document.getElementById('sources').innerHTML = `<p class="text-red-500 text-sm">${data.error}</p>`; return; }
    lastData = data;
    renderResult(data, lat, lng);
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('sources').innerHTML = `<p class="text-red-500 text-sm">Error: ${e.message}</p>`;
  }
}

function renderResult(data, lat, lng) {
  clearLayers();
  const t = getToggles();
  const s = data.score;
  const color = scoreColor(s.score);

  // ---- Score panel ----
  const box = document.getElementById('score-box');
  box.classList.remove('hidden');
  const sc = Math.max(0, Math.min(100, s.score));
  const trackColor = sc >= 60 ? 'bg-emerald-100' : sc >= 40 ? 'bg-amber-100' : 'bg-red-100';
  const fillColor = sc >= 60 ? 'bg-emerald-500' : sc >= 40 ? 'bg-amber-500' : 'bg-red-500';
  // Compact stat helper. Hint is rendered as a separate dim chip to avoid digits running into the value.
  const stat = (k, v, hint) => `<div class="flex justify-between items-baseline py-0.5"><span class="text-slate-400">${k}</span><span><span class="text-slate-700 font-medium">${v}</span>${hint ? ` <span class="text-slate-400 text-[10px]" style="margin-left:6px">${hint}</span>` : ''}</span></div>`;

  box.innerHTML = `
    <div class="flex items-end gap-3 mb-2">
      <div class="text-4xl font-bold leading-none" style="color:${color}">${sc.toFixed(0)}</div>
      <div class="flex-1 mb-1">
        <div class="flex justify-between text-[10px] text-slate-400 mb-1"><span>${s.label}</span><span>Lden ${s.lden_db || s.estimated_db} dB</span></div>
        <div class="relative h-2 ${trackColor} rounded-full overflow-hidden">
          <div class="absolute inset-y-0 left-0 ${fillColor} rounded-full transition-all duration-500" style="width:${sc}%"></div>
        </div>
      </div>
    </div>

    <div class="text-[10px] text-slate-400 uppercase tracking-wide mt-3 mb-1">Time of day</div>
    <div class="text-xs">
      ${stat('Leq 24h', (s.leq_db || '?') + ' dB')}
      ${stat('Lden (penalised)', (s.lden_db || s.estimated_db) + ' dB')}
      ${stat('Day 7-19', (s.leq_day_db || '?') + ' dB')}
      ${stat('Night 23-7', (s.leq_night_db || '?') + ' dB')}
    </div>

    <div class="text-[10px] text-slate-400 uppercase tracking-wide mt-3 mb-1">By source</div>
    <div class="text-xs">
      ${stat('Road (L10)', s.road_db + ' dB', `${s.road_count || 0} segs`)}
      ${stat('Rail', (s.rail_db || 0) + ' dB', s.nearest_tram_m != null ? `tram ${s.nearest_tram_m}m` : (s.nearest_train_m != null ? `train ${s.nearest_train_m}m` : ''))}
      ${stat('AADT counts', `${s.aadt_segments || 0} VicRoads · ${s.nfdh_stations || 0} NFDH`)}
      ${s.max_building_screening_db ? stat('Building screening', `-${s.max_building_screening_db} dB`) : ''}
    </div>

    ${s.lden_max_facade ? `
    <div class="text-[10px] text-slate-400 uppercase tracking-wide mt-3 mb-1">Facade asymmetry</div>
    <div class="text-xs">
      ${stat('Max', s.lden_max_facade + ' dB', s.max_facade_dir)}
      ${stat('Min', s.lden_min_facade + ' dB', s.min_facade_dir)}
      ${stat('Range', s.facade_range_db + ' dB')}
    </div>` : ''}`;

  // Always-on basics: query point + radius
  addGeoJSON('query-pt', { type: 'Feature', geometry: { type: 'Point', coordinates: [lng, lat] } }, {
    type: 'circle', paint: { 'circle-radius': 8, 'circle-color': '#8b5cf6', 'circle-stroke-width': 2, 'circle-stroke-color': '#fff' }
  });
  const circle = turf_circle([lng, lat], 0.5);
  addGeoJSON('radius', circle, {
    type: 'line', paint: { 'line-color': '#8b5cf6', 'line-width': 1, 'line-dasharray': [4, 4], 'line-opacity': 0.5 }
  });

  // ---- Source list (sidebar) + map markers ----
  const src = data.sources;
  let html = '';

  // AADT
  if (src.aadt.length) {
    html += `<h3 class="text-sm font-semibold text-brand-600 mt-4 mb-2">VicRoads AADT (${src.aadt.length})</h3>`;
    src.aadt.sort((a,b) => b.db - a.db);
    const features = [], lines = [];
    for (const a of src.aadt.slice(0, 10)) {
      html += `<div class="pl-3 border-l-2 border-red-400 py-1.5 mb-1 cursor-pointer hover:bg-slate-50 rounded-r text-xs" onclick="map.flyTo({center:[${a.lng},${a.lat}],zoom:18})">
        <div class="font-semibold text-slate-700">${a.road_name || 'Unknown'}</div>
        <div class="text-slate-400">AADT ${a.aadt.toLocaleString()} | ${a.distance_m}m | ${a.db} dB${a.screening_db ? ` <span class="text-emerald-600">(-${a.screening_db})</span>` : ''}</div>
      </div>`;
      features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [a.lng, a.lat] }, properties: { aadt: a.aadt, name: a.road_name, db: a.db, dist: a.distance_m, screening: a.screening_db || 0 } });
      lines.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: [[lng, lat], [a.lng, a.lat]] }, properties: { screening: a.screening_db || 0, db: a.db, name: a.road_name } });
    }
    if (features.length) {
      addGeoJSON('aadt-pts', { type: 'FeatureCollection', features }, {
        type: 'circle', paint: { 'circle-radius': ['interpolate', ['linear'], ['get', 'aadt'], 0, 3, 50000, 12], 'circle-color': '#ef4444', 'circle-opacity': 0.7 }
      });
      addGeoJSON('aadt-lines', { type: 'FeatureCollection', features: lines }, sourceLineLayerDef(t.screening));
      attachLineHover('aadt-lines');
    }
  }

  // NFDH
  if (src.nfdh.length) {
    html += `<h3 class="text-sm font-semibold text-amber-600 mt-4 mb-2">NFDH Stations (${src.nfdh.length})</h3>`;
    src.nfdh.sort((a,b) => b.db - a.db);
    const features = [], nLines = [];
    for (const n of src.nfdh.slice(0, 10)) {
      html += `<div class="pl-3 border-l-2 border-amber-400 py-1.5 mb-1 cursor-pointer hover:bg-slate-50 rounded-r text-xs" onclick="map.flyTo({center:[${n.lng},${n.lat}],zoom:18})">
        <div class="font-semibold text-slate-700">${n.road_name || 'Station'}</div>
        <div class="text-slate-400">AADT ${n.aadt.toLocaleString()} | ${n.distance_m}m | ${n.db} dB${n.screening_db ? ` <span class="text-emerald-600">(-${n.screening_db})</span>` : ''}</div>
      </div>`;
      features.push({ type: 'Feature', geometry: { type: 'Point', coordinates: [n.lng, n.lat] }, properties: { aadt: n.aadt, name: n.road_name, db: n.db, dist: n.distance_m, screening: n.screening_db || 0 } });
      nLines.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: [[lng, lat], [n.lng, n.lat]] }, properties: { screening: n.screening_db || 0, db: n.db, name: n.road_name } });
    }
    if (features.length) {
      addGeoJSON('nfdh-pts', { type: 'FeatureCollection', features }, {
        type: 'circle', paint: { 'circle-radius': ['interpolate', ['linear'], ['get', 'aadt'], 0, 3, 50000, 12], 'circle-color': '#f59e0b', 'circle-opacity': 0.7 }
      });
      addGeoJSON('nfdh-lines', { type: 'FeatureCollection', features: nLines }, sourceLineLayerDef(t.screening));
      attachLineHover('nfdh-lines');
    }
  }

  // Rail (sidebar list + screening lines if rail source has lat/lng)
  if (src.rail.length) {
    html += `<h3 class="text-sm font-semibold text-blue-600 mt-4 mb-2">Rail/Tram (${src.rail.length})</h3>`;
    src.rail.sort((a,b) => b.db - a.db);
    const railLineFeats = [];
    for (const r of src.rail) {
      const icon = r.type === 'tram' ? 'Tram' : 'Train';
      html += `<div class="pl-3 border-l-2 border-blue-400 py-1.5 mb-1 text-xs">
        <div class="font-semibold text-slate-700">${icon}: ${r.route}</div>
        <div class="text-slate-400">${r.distance_m}m | ${r.db} dB${r.screening_db ? ` <span class="text-emerald-600">(-${r.screening_db})</span>` : ''} | ${r.peak_svc_hr || '?'}/hr peak</div>
      </div>`;
      if (r.lat != null && r.lng != null) {
        railLineFeats.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: [[lng, lat], [r.lng, r.lat]] }, properties: { screening: r.screening_db || 0, db: r.db, name: `${icon}: ${r.route}` } });
      }
    }
    if (railLineFeats.length) {
      addGeoJSON('rail-screening-lines', { type: 'FeatureCollection', features: railLineFeats }, sourceLineLayerDef(t.screening));
      attachLineHover('rail-screening-lines');
    }
  }

  // Rail track shapes
  const railFeatures = [];
  for (const shape of (src.rail_shapes || [])) {
    if (shape.coords.length < 2) continue;
    railFeatures.push({ type: 'Feature', geometry: { type: 'LineString', coordinates: shape.coords.map(c => [c[1], c[0]]) }, properties: { type: shape.route_type } });
  }
  if (railFeatures.length) {
    addGeoJSON('rail-lines', { type: 'FeatureCollection', features: railFeatures }, {
      type: 'line', paint: { 'line-color': ['match', ['get', 'type'], 0, '#22c55e', '#3b82f6'], 'line-width': 3, 'line-opacity': 0.7 }
    });
  }

  // ---- Wave ripple animation (uses existing source lines) ----
  if (t.ripple) startRippleAnimation(lat, lng, src);

  // ---- Facade pie ----
  if (t.facade && s.facade_sectors) drawFacadePie(s, lat, lng);

  // ---- Terrain elevation profile (async — open-meteo API ~1-2s) ----
  const terrainChart = document.getElementById('terrain-chart');
  if (t.terrain && data.terrain_source) {
    fetchAndDrawTerrain(data.terrain_source, lat, lng);
  } else {
    terrainChart.classList.add('hidden');
  }

  document.getElementById('sources').innerHTML = html;
}

let terrainFetchToken = 0;
async function fetchAndDrawTerrain(src, lat, lng) {
  const myToken = ++terrainFetchToken;
  const chart = document.getElementById('terrain-chart');
  chart.classList.remove('hidden');
  chart.innerHTML = `<div class="text-xs text-slate-400 py-2 text-center">Loading terrain profile to ${src.name || 'source'} (${src.distance_m}m)...</div>`;
  try {
    const url = `/scores/noise/terrain?src_lat=${src.lat}&src_lng=${src.lng}&lat=${lat}&lng=${lng}`;
    const profile = await fetch(url).then(r => r.json());
    if (myToken !== terrainFetchToken) return;  // a newer query started
    if (profile.error) { chart.innerHTML = `<div class="text-xs text-red-500 py-2 text-center">Terrain unavailable</div>`; return; }
    profile.source_name = src.name;
    profile.source_lat = src.lat;
    profile.source_lng = src.lng;
    profile.source_db = src.db;
    drawTerrainProfile(profile, lat, lng);
  } catch (e) {
    if (myToken !== terrainFetchToken) return;
    chart.innerHTML = `<div class="text-xs text-red-500 py-2 text-center">Terrain fetch failed: ${e.message}</div>`;
  }
}

// Layer definition for source-to-receiver line, optionally colored by screening
function sourceLineLayerDef(showScreening) {
  if (showScreening) {
    return {
      type: 'line',
      paint: {
        // 0 dB screening (direct) → red, 25 dB → green
        'line-color': ['interpolate', ['linear'], ['get', 'screening'], 0, '#ef4444', 12, '#f59e0b', 25, '#22c55e'],
        'line-width': ['interpolate', ['linear'], ['get', 'screening'], 0, 2, 25, 1],
        'line-opacity': 0.7,
      }
    };
  }
  return { type: 'line', paint: { 'line-color': '#94a3b8', 'line-width': 1, 'line-opacity': 0.4, 'line-dasharray': [3, 3] } };
}

function attachLineHover(layerId) {
  map.on('mousemove', layerId, (e) => {
    if (!e.features.length) return;
    const p = e.features[0].properties;
    popup.setLngLat(e.lngLat).setHTML(
      `<div style="font-size:12px"><b>${p.name || ''}</b><br>${p.db} dB · screening -${p.screening || 0} dB</div>`
    ).addTo(map);
    map.getCanvas().style.cursor = 'pointer';
  });
  map.on('mouseleave', layerId, () => { popup.remove(); map.getCanvas().style.cursor = ''; });
}

// ---- Sound wave ripple animation -------------------------------------------
// For each top source, expand a ring from source toward the receiver in sync
// with the noise frequency (louder source = faster ripple).
function startRippleAnimation(lat, lng, src) {
  if (rippleRAF) cancelAnimationFrame(rippleRAF);
  // Collect top sources (max 8 total) with src_lat / src_lng + db
  const all = [];
  for (const a of src.aadt.slice(0, 4)) all.push({lat: a.lat, lng: a.lng, db: a.db});
  for (const n of src.nfdh.slice(0, 2)) all.push({lat: n.lat, lng: n.lng, db: n.db});
  for (const r of src.rail.slice(0, 4)) {
    if (r.lat != null) all.push({lat: r.lat, lng: r.lng, db: r.db});
  }
  if (!all.length) return;

  // Init source: empty FeatureCollection of ripple rings
  addGeoJSON('ripple', { type: 'FeatureCollection', features: [] }, {
    type: 'line',
    paint: {
      'line-color': ['interpolate', ['linear'], ['get', 'db'], 35, '#22c55e', 55, '#f59e0b', 75, '#ef4444'],
      'line-width': 2,
      'line-opacity': ['interpolate', ['linear'], ['get', 'age'], 0, 0.7, 1, 0],
    }
  });

  rippleStart = performance.now();
  function tick(now) {
    const elapsed = (now - rippleStart) / 1000; // seconds
    const features = [];
    for (let i = 0; i < all.length; i++) {
      const s = all[i];
      // Period scales inversely with dB: louder sources ripple faster (1.5s @ 75dB → 4s @ 35dB)
      const period = Math.max(1.5, 5 - (s.db - 35) / 10);
      const phase = ((elapsed + i * 0.3) % period) / period;  // 0 → 1
      const radiusM = phase * 250;  // expand to 250m
      if (radiusM < 5) continue;
      features.push({
        type: 'Feature',
        geometry: turf_circle([s.lng, s.lat], radiusM / 1000, 48).geometry,
        properties: { db: s.db, age: phase },
      });
    }
    const source = map.getSource('ripple');
    if (source) source.setData({ type: 'FeatureCollection', features });
    rippleRAF = requestAnimationFrame(tick);
  }
  rippleRAF = requestAnimationFrame(tick);
}

// ---- Facade direction rose chart ------------------------------------------
// Petal radius scales with dB on an absolute scale (35→0px, 80→100px),
// so quiet directions visibly shrink and loud directions stretch out.
// Color uses an absolute dB scale (green→amber→red) — same scale across
// all queries so two points are comparable.
const ROSE_DIRS = ['N','NE','E','SE','S','SW','W','NW'];
const ROSE_MIN_DB = 35;
const ROSE_MAX_DB = 80;
const ROSE_MIN_R = 25;
const ROSE_MAX_R = 110;

function dbToColor(db) {
  // 35 dB → emerald, 55 → amber, 75 → red
  if (db <= 45) return '#22c55e';
  if (db <= 55) return '#84cc16';
  if (db <= 65) return '#f59e0b';
  if (db <= 72) return '#ef4444';
  return '#b91c1c';
}

function dbToRadiusM(db) {
  const t = Math.max(0, Math.min(1, (db - ROSE_MIN_DB) / (ROSE_MAX_DB - ROSE_MIN_DB)));
  return ROSE_MIN_R + t * (ROSE_MAX_R - ROSE_MIN_R);
}

function drawFacadePie(s, lat, lng) {
  const vals = ROSE_DIRS.map(d => s.facade_sectors[d] || 35);
  const sectorFeatures = [];
  const labelFeatures = [];
  const cosLat = Math.cos(lat * Math.PI / 180);

  ROSE_DIRS.forEach((dir, i) => {
    const db = vals[i];
    const radiusM = dbToRadiusM(db);
    const startAngle = i * 45 - 22.5;
    const endAngle = startAngle + 45;
    const color = dbToColor(db);
    const coords = [[lng, lat]];
    for (let a = startAngle; a <= endAngle; a += 3) {
      const rad = a * Math.PI / 180;
      const dlat = radiusM * Math.cos(rad) / 111320;
      const dlng = radiusM * Math.sin(rad) / (111320 * cosLat);
      coords.push([lng + dlng, lat + dlat]);
    }
    coords.push([lng, lat]);
    sectorFeatures.push({
      type: 'Feature',
      geometry: { type: 'Polygon', coordinates: [coords] },
      properties: { color, db, dir, radiusM: Math.round(radiusM) }
    });

    // Label point at sector center, just outside the petal
    const labelAngle = i * 45;
    const labelRad = labelAngle * Math.PI / 180;
    const labelDist = radiusM + 18;
    const lblLat = lat + labelDist * Math.cos(labelRad) / 111320;
    const lblLng = lng + labelDist * Math.sin(labelRad) / (111320 * cosLat);
    labelFeatures.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [lblLng, lblLat] },
      properties: { dir, db: db.toFixed(0), label: `${dir}\n${db.toFixed(0)}dB` }
    });
  });

  // Fill petals
  addGeoJSON('facade', { type: 'FeatureCollection', features: sectorFeatures }, {
    type: 'fill',
    paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.45 }
  });
  // Crisp outline so petals stay distinguishable on busy basemaps
  addGeoJSON('facade-border', { type: 'FeatureCollection', features: sectorFeatures }, {
    type: 'line',
    paint: { 'line-color': ['get', 'color'], 'line-width': 1.5, 'line-opacity': 0.9 }
  });
  // Direction + dB text labels just outside each petal
  addGeoJSON('facade-labels', { type: 'FeatureCollection', features: labelFeatures }, {
    type: 'symbol',
    layout: {
      'text-field': ['get', 'label'],
      'text-size': 11,
      'text-font': ['Open Sans Semibold', 'Arial Unicode MS Bold'],
      'text-allow-overlap': true,
      'text-anchor': 'center',
      'text-line-height': 1.0,
    },
    paint: {
      'text-color': '#1e293b',
      'text-halo-color': 'rgba(255,255,255,0.95)',
      'text-halo-width': 2,
    }
  });

  // Hover for finer detail
  map.on('mousemove', 'facade', (e) => {
    if (!e.features.length) return;
    const p = e.features[0].properties;
    popup.setLngLat(e.lngLat).setHTML(`<div style="font-size:12px"><b>${p.dir}</b>: ${p.db} dB · ${p.radiusM}m petal</div>`).addTo(map);
    map.getCanvas().style.cursor = 'pointer';
  });
  map.on('mouseleave', 'facade', () => { popup.remove(); map.getCanvas().style.cursor = ''; });
}

// ---- Terrain elevation profile ---------------------------------------------
function drawTerrainProfile(terrain, lat, lng) {
  const samples = terrain.samples || [];
  if (samples.length < 2) {
    document.getElementById('terrain-chart').classList.add('hidden');
    return;
  }

  const W = 320, H = 120, padL = 32, padR = 8, padT = 8, padB = 22;
  const xs = samples.map(s => s.dist_m);
  const ys = samples.flatMap(s => [s.elev_m, s.sight_line_m]).filter(v => v != null);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys) - 1;
  const yMax = Math.max(...ys) + 1;

  const sx = d => padL + (d - xMin) / (xMax - xMin) * (W - padL - padR);
  const sy = e => H - padB - (e - yMin) / (yMax - yMin) * (H - padT - padB);

  // Ground polygon (terrain elevation, filled)
  let ground = `M ${sx(samples[0].dist_m)} ${H - padB}`;
  for (const s of samples) ground += ` L ${sx(s.dist_m)} ${sy(s.elev_m)}`;
  ground += ` L ${sx(samples[samples.length-1].dist_m)} ${H - padB} Z`;

  // Sight line (source ear height → receiver ear height)
  const sightLine = samples.map((s, i) => `${i === 0 ? 'M' : 'L'} ${sx(s.dist_m)} ${sy(s.sight_line_m)}`).join(' ');

  // Detect any blocking ridges (ground above sight line by ≥ 3m)
  const blockedSamples = samples.filter(s => (s.elev_m || 0) - (s.sight_line_m || 0) >= 3);
  const blockedHTML = blockedSamples.length
    ? `<div class="text-xs text-amber-700 mt-1">Ridge blocks sight line at ${blockedSamples.length} sample point${blockedSamples.length>1?'s':''}.</div>`
    : `<div class="text-xs text-emerald-700 mt-1">Direct line of sight (no terrain blocking).</div>`;

  const chart = document.getElementById('terrain-chart');
  chart.classList.remove('hidden');
  chart.innerHTML = `
    <div class="flex items-center justify-between mb-1">
      <div class="text-xs font-semibold text-slate-600">Terrain → ${terrain.source_name || 'Source'}</div>
      <div class="text-[11px] text-slate-400">${terrain.total_dist_m}m · ${terrain.source_db} dB raw</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="w-full">
      <path d="${ground}" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
      <path d="${sightLine}" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
      <text x="2" y="${sy(yMax)+4}" font-size="9" fill="#64748b">${yMax.toFixed(0)}m</text>
      <text x="2" y="${sy(yMin)+4}" font-size="9" fill="#64748b">${yMin.toFixed(0)}m</text>
      <text x="${padL}" y="${H-6}" font-size="9" fill="#64748b">source</text>
      <text x="${W-padR-30}" y="${H-6}" font-size="9" fill="#64748b">you</text>
    </svg>
    ${blockedHTML}
  `;

  // Also draw source-to-receiver line on map highlighted (so user can see which source profile is for)
  if (terrain.source_lat != null && terrain.source_lng != null) {
    addGeoJSON('terrain-line', {
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: [[terrain.source_lng, terrain.source_lat], [lng, lat]] },
      properties: {},
    }, {
      type: 'line',
      paint: { 'line-color': '#7c3aed', 'line-width': 2, 'line-dasharray': [2, 2], 'line-opacity': 0.8 },
    });
  }
}

function turf_circle(center, radiusKm, steps = 64) {
  const coords = [];
  for (let i = 0; i <= steps; i++) {
    const angle = (i / steps) * 2 * Math.PI;
    const dx = radiusKm * Math.cos(angle) / (111.32 * Math.cos(center[1] * Math.PI / 180));
    const dy = radiusKm * Math.sin(angle) / 110.574;
    coords.push([center[0] + dx, center[1] + dy]);
  }
  return { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } };
}
